<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<button onclick="toggleDark()" class="btn btn-dark position-absolute top-0 end-0 m-3">
<i class="bi bi-moon"></i>
</button>

<div class="container">
<div class="row justify-content-center align-items-center vh-100">
<div class="col-md-4">

<div class="card p-4">

<h3 class="text-center mb-3">Login</h3>

<form onsubmit="goToDashboard(event)">

<div class="mb-3">
<label>Email</label>
<input type="email" id="loginEmail" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>

<div class="input-group">
<input type="password" id="loginPass" class="form-control" required>

<span class="input-group-text" role="button" onclick="togglePassword()" style="cursor:pointer;">
<i id="eyeIcon" class="bi bi-eye"></i>
</span>

</div>

</div>

<button type="submit" class="btn btn-primary w-100">Login</button>

<div class="text-center mt-3">
<a href="forgot-password.html">Forgot Password?</a><br>
<a href="register.html">Create Account</a>
</div>

</form>

</div>
</div>
</div>
</div>

<script>

function togglePassword(){
const input = document.getElementById("loginPass");
const icon = document.getElementById("eyeIcon");

if(input.type === "password"){
input.type = "text";
icon.classList.replace("bi-eye", "bi-eye-slash");
} else {
input.type = "password";
icon.classList.replace("bi-eye-slash", "bi-eye");
}
}

function toggleDark(){
document.body.classList.toggle("dark-mode");
}

function goToDashboard(e){
e.preventDefault();

let email = document.getElementById("loginEmail").value;
let password = document.getElementById("loginPass").value;

// get stored data
let storedEmail = localStorage.getItem("userEmail");
let storedPassword = localStorage.getItem("userPassword");

// default values if not set
if(!storedEmail){
storedEmail = "test@gmail.com";
localStorage.setItem("userEmail", storedEmail);
}
if(!storedPassword){
storedPassword = "Admin@123";
localStorage.setItem("userPassword", storedPassword);
}

if(email === storedEmail && password === storedPassword){
window.location.href = "dashboard.html";
} else {
alert("Invalid Email or Password ❌");
}
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
