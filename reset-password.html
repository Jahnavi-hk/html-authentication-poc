<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">
<div class="row justify-content-center align-items-center vh-100">
<div class="col-md-4">

<div class="card p-4 shadow">

<h4 class="text-center mb-3">Reset Password</h4>

<form onsubmit="goToLogin(event)">


<div class="input-group mb-3">
<input type="password" id="newPass" class="form-control" placeholder="New Password" required>
<button class="btn btn-outline-secondary" type="button" onclick="togglePassword('newPass')">
<i class="bi bi-eye"></i>
</button>
</div>


<div class="mb-3">
<input type="password" id="confirmPass" class="form-control" placeholder="Confirm Password" required>
</div>


<button type="submit" class="btn btn-primary w-100">Update Password</button>

</form>

</div>
</div>
</div>
</div>

<script>

function togglePassword(id){
let p=document.getElementById(id);
p.type=p.type==="password"?"text":"password";
}

function goToLogin(e){
e.preventDefault();

let p = document.getElementById("newPass").value;
let c = document.getElementById("confirmPass").value;

let pattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,}$/;

if(!pattern.test(p)){
alert("Password must contain uppercase, lowercase, number, special character and minimum 8 characters");
return;
}

if(p !== c){
alert("Passwords do not match");
return;
}


localStorage.setItem("userPassword", p);

alert("Password Updated Successfully ✅");
window.location.href = "index.html";
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
