<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">
<div class="row justify-content-center align-items-center vh-100">
<div class="col-md-4">

<div class="card p-4">

<h3 class="text-center">Register</h3>

<form onsubmit="return validateForm()">

<div class="mb-3">
<label>Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>

<div class="input-group">
<input type="password" id="password" class="form-control" onkeyup="checkRules()" required>
<button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password')">
<i class="bi bi-eye"></i>
</button>
</div>

<div class="password-rules mt-2">

<p id="upper" class="invalid">Uppercase letter</p>
<p id="lower" class="invalid">Lowercase letter</p>
<p id="number" class="invalid">Number</p>
<p id="special" class="invalid">Special character</p>
<p id="length" class="invalid">Minimum 8 characters</p>

</div>

</div>

<div class="mb-3">
<label>Confirm Password</label>
<input type="password" id="confirm" class="form-control" required>
</div>

<button type="submit" class="btn btn-success w-100">Register</button>

</form>

<div class="text-center mt-3">
<a href="index.html" class="btn btn-outline-primary w-100">Back to Login</a>
</div>

</div>
</div>
</div>
</div>

<script>

function togglePassword(id){
let p=document.getElementById(id);
p.type=p.type==="password"?"text":"password";
}

function checkRules(){

let val=document.getElementById("password").value;

document.getElementById("upper").className = /[A-Z]/.test(val) ? "valid":"invalid";
document.getElementById("lower").className = /[a-z]/.test(val) ? "valid":"invalid";
document.getElementById("number").className = /[0-9]/.test(val) ? "valid":"invalid";
document.getElementById("special").className = /[!@#$%^&*]/.test(val) ? "valid":"invalid";
document.getElementById("length").className = val.length>=8 ? "valid":"invalid";

}

function validateForm(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;
let confirm = document.getElementById("confirm").value;


let emailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;

if(!emailPattern.test(email)){
alert("Enter valid Gmail");
return false;
}


let passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{8,}$/;

if(!passwordPattern.test(password)){
alert("Weak password");
return false;
}

if(password !== confirm){
alert("Passwords do not match");
return false;
}


localStorage.setItem("userEmail", email);
localStorage.setItem("userPassword", password);

alert("Registered Successfully ✅");
window.location.href = "index.html";

return false;
}


</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
